<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0c0f12">
    <title>StarBucks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="./assets/StarBucks_logo.png">
    <link rel="stylesheet" href="./styles.css">
    <script defer src="./main.js"></script>

</head>

<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="#" class="brand" aria-label="StarBucks">
                <span class="brand-text">StarBucks</span>
            </a>
            <nav class="nav" aria-label="Основная навигация">
                <button class="nav-toggle" aria-expanded="false" aria-controls="primary-nav">
                    <span class="sr-only">Открыть меню</span>
                    <span class="burger" aria-hidden="true">
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                    </span>
                </button>
                <ul id="primary-nav" class="nav-list">
                    <li><a class="nav-link active" href="#home" aria-current="page">Home</a></li>
                    <li><a class="nav-link" href="#select">Select</a></li>
                    <li><a class="nav-link" href="#shop">Shop</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="hero container" id="home" aria-label="Hero">
        <section class="hero-content">
            <h1 class="hero-title">
                New Cafe<br>
                by <span class="accent">StarBucks</span>
            </h1>
            <p class="hero-sub">Have time to buy the most harmonious drinks in the
                new Starbucks coffee and don't forget about the discount!</p>
            <div class="hero-ctas">
                <a href="#select" class="btn btn-select" aria-label="Select a coffee">
                    <span>Select a coffee</span>
                </a>
                <a href="#more" class="btn btn-more" aria-label="More">
                    <span>More</span>
                </a>
            </div>
        </section>
        <section class="hero-media">
            <img class="hero-cup" src="./assets/Starbucks_cap.png" alt="Starbucks cap">
        </section>
    </main>
</body>

</html>
